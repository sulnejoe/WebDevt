<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Attractions - Baguio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-overlay">
    <nav class="white-top-bar">
        <div class="top-logo"><img src="cob logo.png" alt="Logo"></div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Home</a>
            <a href="attractions.html" class="nav-btn">Attractions</a>
        </div>
    </nav>

    <main class="list-container">
        <h1 class="page-title">List of Tourist Attractions:</h1>
        <div class="attractions-grid">
            <div class="card">
                <img src="baguio bg.jpg" alt="Burnham Park">
                <div class="card-content">
                    <h2>BURNHAM PARK</h2>
                    <a href="burnham.html" class="discover-btn">Discover More</a>

            </div>
            <div class="card">

            <div class="card">

                <div class="card-content">
                    <h2>IGOROT STONE KINGDOM</h2>
                    <a href="igorotstonekingdom.html" class="discover-btn">Discover More</a>

            <div class="card">
                <img src="lionshead.jpg" alt="Lions Head">
                <div class="card-content">
                    <h2>LION'S HEAD</h2>
                    <a href="lionshead.html" class="discover-btn">Discover More</a>
